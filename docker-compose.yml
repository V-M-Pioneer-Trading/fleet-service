services:
  app:
    container_name: fleet-service-app
    build: .
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      SPACETRADERS_BASE_URL: https://api.spacetraders.io/v2
      AGENT_SERVICE_URL: http://host.docker.internal:8080
      CORS_ALLOWED_ORIGIN: http://localhost:3000
